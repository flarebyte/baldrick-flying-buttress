    - ResolveQuery
    - Select
    - applyQueryArgs
    - compactStrings
    - normalizeQuery
  import_files_list:
    - fmt
    - github.com/flarebyte/baldrick-flying-buttress/internal/domain
    - github.com/flarebyte/baldrick-flying-buttress/internal/ordering
    - strconv
    - strings
  language: go
